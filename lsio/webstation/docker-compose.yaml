# [Webstation](https://github.com/linuxserver/docker-webstation) is a web native
# emulation focused LXQt desktop based on Ubuntu.

---
services:
  webstation:
    image: lscr.io/linuxserver/webstation:latest
    container_name: webstation
    environment:
      # Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
      - PUID=${PUID:-1000}
      # Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
      - PGID=${PGID:-1000}
      # specify a timezone to use, see this [list](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List).
      - TZ=${TZ:-Etc/UTC}
    volumes:
      # Users home directory in the container, stores all files and games.
      - ${BASEDIR:-/srv/lsio}/webstation/config:/config
    ports:
      # Webstation desktop gui HTTP must be proxied.
      - 3000:3000
      # Webstation desktop gui HTTPS.
      - 3001:3001
    shm_size: "1gb"
    restart: unless-stopped
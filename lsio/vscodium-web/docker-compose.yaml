# [Vscodium-web](https://vscodium.com/) is a community-driven, freely-licensed
# binary distribution of the remote host web component of Microsoft's editor VS
# Code.

---
services:
  vscodium-web:
    image: lscr.io/linuxserver/vscodium-web:latest
    container_name: vscodium-web
    environment:
      # Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
      - PUID=${PUID:-1000}
      # Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
      - PGID=${PGID:-1000}
      # specify a timezone to use, see this [list](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List).
      - TZ=${TZ:-Etc/UTC}
      # Optional security token for accessing the Web UI (ie. `supersecrettoken`). [OPTIONAL]
      - CONNECTION_TOKEN=
      # Optional path to a file inside the container that contains the security token for accessing the Web UI (ie. `/path/to/file`). Overrides `CONNECTION_TOKEN`. [OPTIONAL]
      - CONNECTION_TOKEN_FILE=
      # If this optional variable is set, user will have sudo access in the vscodium-web terminal with the specified password. [OPTIONAL]
      - SUDO_PASSWORD=password
      # Optionally set sudo password via hash (takes priority over `SUDO_PASSWORD` var). Format is `$type$salt$hashed`. [OPTIONAL]
      - SUDO_PASSWORD_HASH=
      # Optionally add cli parameters to vscodium binary. [OPTIONAL]
      - CODE_ARGS=
    volumes:
      # Contains all relevant configuration files.
      - ${BASEDIR:-/srv/lsio}/vscodium-web/config:/config
    ports:
      # Web UI port.
      - 8000:8000
    restart: unless-stopped
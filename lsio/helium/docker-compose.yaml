# [Helium](https://helium.computer/) is a Chromium-based web browser made for
# people, with love. Privacy-first with unbiased ad-blocking.

---
services:
  helium:
    image: lscr.io/linuxserver/helium:latest
    container_name: helium
    environment:
      # Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
      - PUID=${PUID:-1000}
      # Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
      - PGID=${PGID:-1000}
      # specify a timezone to use, see this [list](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List).
      - TZ=${TZ:-Etc/UTC}
      # Specify one or multiple Chromium CLI flags, this string will be passed to the application in full. [OPTIONAL]
      - HELIUM_CLI=https://www.linuxserver.io/
    volumes:
      # Users home directory in the container, stores local files and settings
      - ${BASEDIR:-/srv/lsio}/helium/config:/config
    ports:
      # HTTP Helium desktop gui, must be proxied.
      - 3000:3000
      # HTTPS Helium desktop gui.
      - 3001:3001
    shm_size: "1gb"
    restart: unless-stopped
# [PPSSPP](https://www.ppsspp.org/) is a free and open-source PSP emulator for
# Windows, macOS, Linux, iOS, Android, Nintendo Wii U, Nintendo Switch,
# BlackBerry 10, MeeGo, Pandora, Xbox Series and Symbian with a focus on speed
# and portability.

---
services:
  ppsspp:
    image: lscr.io/linuxserver/ppsspp:latest
    container_name: ppsspp
    environment:
      # Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
      - PUID=${PUID:-1000}
      # Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
      - PGID=${PGID:-1000}
      # specify a timezone to use, see this [list](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List).
      - TZ=${TZ:-Etc/UTC}
    volumes:
      # Users home directory in the container, stores local files and settings
      - ${BASEDIR:-/srv/lsio}/ppsspp/config:/config
    ports:
      # PPSSPP desktop gui HTTP, must be proxied.
      - 3000:3000
      # PPSSPP desktop gui HTTPS.
      - 3001:3001
    shm_size: "1gb" # [OPTIONAL]
    restart: unless-stopped
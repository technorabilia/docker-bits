# [shadPS4](https://shadps4.net/) is an early PlayStation 4 emulator for
# Windows, Linux and macOS written in C++.

---
services:
  shadps4:
    image: lscr.io/linuxserver/shadps4:latest
    container_name: shadps4
    environment:
      # Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
      - PUID=${PUID:-1000}
      # Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
      - PGID=${PGID:-1000}
      # specify a timezone to use, see this [list](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List).
      - TZ=${TZ:-Etc/UTC}
    volumes:
      # Users home directory in the container, stores all files and games.
      - ${BASEDIR:-/srv/lsio}/shadps4/config:/config
    ports:
      # shadPS4 desktop gui HTTP must be proxied.
      - 3000:3000
      # shadPS4 desktop gui HTTPS.
      - 3001:3001
    shm_size: "1gb"
    restart: unless-stopped
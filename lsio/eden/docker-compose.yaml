# [Eden](https://eden-emu.dev/) is an experimental open-source emulator for the
# Nintendo Switch, built with performance and stability in mind.

---
services:
  eden:
    image: lscr.io/linuxserver/eden:latest
    container_name: eden
    environment:
      # Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
      - PUID=${PUID:-1000}
      # Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
      - PGID=${PGID:-1000}
      # specify a timezone to use, see this [list](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List).
      - TZ=${TZ:-Etc/UTC}
    volumes:
      # Users home directory in the container, stores local files and settings
      - ${BASEDIR:-/srv/lsio}/eden/config:/config
    ports:
      # Eden desktop gui HTTP must be proxied.
      - 3000:3000
      # Eden desktop gui HTTPS.
      - 3001:3001
    shm_size: "1gb"
    restart: unless-stopped